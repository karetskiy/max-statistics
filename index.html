<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Статистика MAX - Сводный отчет_2</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,20,50,0.15);
            padding: 22px 20px 30px 20px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #13294b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-left: 8px;
        }
        h1 span {
            background: #2e5bff;
            color: white;
            font-size: 13px;
            padding: 5px 14px;
            border-radius: 40px;
        }
        /* Верхняя панель с выбором филиала и датой */
        .top-panel {
            background: #f8fafd;
            border-radius: 22px;
            padding: 18px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px 30px;
            border: 1px solid #dde3ec;
        }
        .branch-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2 1 300px;
        }
        .branch-selector label {
            font-weight: 600;
            color: #1b2b4b;
            font-size: 16px;
            white-space: nowrap;
        }
        .branch-selector select {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            background: white;
            font-size: 15px;
            font-weight: 500;
            color: #0e1c3a;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            min-width: 220px;
        }
        .branch-selector select:hover, .branch-selector select:focus {
            border-color: #2e5bff;
            box-shadow: 0 0 0 3px rgba(46,91,255,0.15);
        }
        .date-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 5px 15px 5px 20px;
            border-radius: 40px;
            border: 1px solid #dae2ed;
        }
        .date-box label {
            font-weight: 600;
            color: #263c6f;
            font-size: 15px;
        }
        .date-box input[type="date"] {
            border: none;
            padding: 10px 0;
            font-size: 15px;
            background: transparent;
            color: #141e3b;
            font-family: inherit;
        }
        /* Таблица */
        .table-section {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #e2eaf2;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th {
            background: #f2f6fc;
            color: #1a2c4b;
            font-weight: 600;
            font-size: 14px;
            padding: 18px 12px;
            text-align: left;
            border-bottom: 2px solid #dbe1ec;
            word-break: break-word;
        }
        td {
            padding: 15px 12px;
            border-bottom: 1px solid #edf2f8;
            vertical-align: middle;
        }
        th:nth-child(1) { width: 16%; }
        th:nth-child(2) { width: 21%; }
        th:nth-child(3) { width: 21%; }
        th:nth-child(4) { width: 22%; }
        th:nth-child(5) { width: 20%; }

        .stat-input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #d4dfed;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            background: #ffffff;
            text-align: right;
            color: #0c1b38;
            transition: 0.15s;
        }
        .stat-input:focus {
            border-color: #2e5bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,91,255,0.15);
        }
        .stat-input::placeholder {
            color: #9bafc9;
            font-weight: 400;
            font-size: 13px;
        }
        .total-row {
            background: #eef3fd;
        }
        .total-row td {
            background: #eef3fd;
            font-weight: 650;
            color: #10213e;
            border-top: 2px solid #c7d4ee;
            border-bottom: none;
            padding: 16px 12px;
        }
        .total-label {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .save-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        .save-btn {
            background: #1e3f8f;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 17px;
            padding: 16px 40px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(30,63,143,0.25);
            transition: 0.2s;
            border: 1px solid #153277;
        }
        .save-btn:hover {
            background: #143177;
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(20,50,120,0.3);
        }
        .filename-hint {
            color: #52709b;
            font-size: 14px;
            margin-top: 12px;
            text-align: right;
            padding-right: 10px;
        }
        .mobile-note {
            display: none;
            font-size: 13px;
            color: #727f94;
            margin-top: 8px;
        }
        @media (max-width: 700px) {
            .container { padding: 15px; }
            th { font-size: 12.5px; padding: 12px 6px; }
            td { padding: 12px 6px; }
            .stat-input { padding: 8px 6px; font-size: 14px; }
            .branch-selector { flex-wrap: wrap; }
            .mobile-note { display: block; }
        }
        .status-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 30px;
            font-weight: 500;
            display: none;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status-sending {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 Сбор статистики по цифровым документам MAX
        <span>один филиал за раз</span>
    </h1>

    <div class="top-panel">
        <div class="branch-selector">
            <label for="branchSelect">🏢 Филиал:</label>
            <select id="branchSelect"></select>
        </div>
        <div class="date-box">
            <label for="reportDate">📅 Дата:</label>
            <input type="date" id="reportDate">
        </div>
    </div>

    <div class="table-section">
        <table id="statsTable">
            <thead>
            <tr>
                <th>Филиал</th>
                <th>Работа по формированию</th>
                <th>Загрузили документы</th>
                <th>Создали ID и загрузили</th>
                <th>Считывания QR-кодов</th>
            </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="save-area">
        <button class="save-btn" id="saveAllBtn">
            📧 Сохранить и отправить на почту
        </button>
    </div>
    <div class="filename-hint">
        Данные отправляются на: karetskyag@mprop.ru
    </div>
    <div id="statusMessage" class="status-message"></div>
    <div class="mobile-note">* поля принимают только цифры</div>
</div>

<script>
(function() {
    const branches = [
        "Головной офис",
        "Филиал Алмалинский",
        "Филиал Ауэзовский",
        "Филиал Бостандыкский",
        "Филиал Медеуский",
        "Филиал Наурызбайский",
        "Филиал Турксибский",
        "Филиал Жетысуский",
        "Региональный центр Астана",
        "Региональный центр Шымкент",
        "Северный филиал",
        "Западный филиал"
    ];

    let allData = {};
    branches.forEach(b => {
        allData[b] = {
            workFormation: '',
            uploadedDocs: '',
            createdIdAndUploaded: '',
            qrScans: ''
        };
    });

    let currentBranch = branches[0];

    const branchSelect = document.getElementById('branchSelect');
    const dateInput = document.getElementById('reportDate');
    const tableBody = document.getElementById('tableBody');
    const saveBtn = document.getElementById('saveAllBtn');
    const statusDiv = document.getElementById('statusMessage');

    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    dateInput.value = `${y}-${m}-${d}`;

    function populateBranchSelect() {
        let options = '';
        branches.forEach(b => {
            options += `<option value="${b}">${b}</option>`;
        });
        branchSelect.innerHTML = options;
        branchSelect.value = currentBranch;
    }
    populateBranchSelect();

    function enforceNumeric(e) {
        const input = e.target;
        let val = input.value;
        val = val.replace(/[^\d]/g, '');
        if (val.length > 9) val = val.slice(0, 9);
        input.value = val;
    }

    function renderTable() {
        const data = allData[currentBranch] || { workFormation: '', uploadedDocs: '', createdIdAndUploaded: '', qrScans: '' };
        let html = '<tr>';
        html += `<td style="font-weight: 600; color: #092044;">${currentBranch}</td>`;
        html += `<td><input type="text" class="stat-input" data-field="workFormation" value="${data.workFormation}" placeholder="только цифры" inputmode="numeric"></td>`;
        html += `<td><input type="text" class="stat-input" data-field="uploadedDocs" value="${data.uploadedDocs}" placeholder="только цифры" inputmode="numeric"></td>`;
        html += `<td><input type="text" class="stat-input" data-field="createdIdAndUploaded" value="${data.createdIdAndUploaded}" placeholder="только цифры" inputmode="numeric"></td>`;
        html += `<td><input type="text" class="stat-input" data-field="qrScans" value="${data.qrScans}" placeholder="только цифры" inputmode="numeric"></td>`;
        html += '</tr>';

        const totalWork = Object.values(allData).reduce((acc, cur) => acc + (parseInt(cur.workFormation, 10) || 0), 0);
        const totalUploaded = Object.values(allData).reduce((acc, cur) => acc + (parseInt(cur.uploadedDocs, 10) || 0), 0);
        const totalId = Object.values(allData).reduce((acc, cur) => acc + (parseInt(cur.createdIdAndUploaded, 10) || 0), 0);
        const totalQr = Object.values(allData).reduce((acc, cur) => acc + (parseInt(cur.qrScans, 10) || 0), 0);

        const fmt = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');

        html += '<tr class="total-row">';
        html += `<td class="total-label">📊 ИТОГО (все филиалы)</td>`;
        html += `<td>${fmt(totalWork)}</td>`;
        html += `<td>${fmt(totalUploaded)}</td>`;
        html += `<td>${fmt(totalId)}</td>`;
        html += `<td>${fmt(totalQr)}</td>`;
        html += '</tr>';

        tableBody.innerHTML = html;

        document.querySelectorAll('.stat-input').forEach(inp => {
            inp.addEventListener('input', enforceNumeric);
            inp.addEventListener('blur', updateDataFromInputs);
        });
    }

    function updateDataFromInputs() {
        const inputs = document.querySelectorAll('.stat-input');
        let work = '', up = '', idUp = '', qr = '';
        inputs.forEach(inp => {
            const field = inp.getAttribute('data-field');
            const val = inp.value;
            if (field === 'workFormation') work = val;
            else if (field === 'uploadedDocs') up = val;
            else if (field === 'createdIdAndUploaded') idUp = val;
            else if (field === 'qrScans') qr = val;
        });
        if (allData[currentBranch]) {
            allData[currentBranch].workFormation = work;
            allData[currentBranch].uploadedDocs = up;
            allData[currentBranch].createdIdAndUploaded = idUp;
            allData[currentBranch].qrScans = qr;
        }
        renderTable();
    }

    branchSelect.addEventListener('change', function(e) {
        const inputs = document.querySelectorAll('.stat-input');
        let work = '', up = '', idUp = '', qr = '';
        inputs.forEach(inp => {
            const field = inp.getAttribute('data-field');
            const val = inp.value;
            if (field === 'workFormation') work = val;
            else if (field === 'uploadedDocs') up = val;
            else if (field === 'createdIdAndUploaded') idUp = val;
            else if (field === 'qrScans') qr = val;
        });
        if (allData[currentBranch]) {
            allData[currentBranch].workFormation = work;
            allData[currentBranch].uploadedDocs = up;
            allData[currentBranch].createdIdAndUploaded = idUp;
            allData[currentBranch].qrScans = qr;
        }
        currentBranch = e.target.value;
        renderTable();
    });

    async function sendToEmail() {
        // Сохраняем текущие данные
        const inputs = document.querySelectorAll('.stat-input');
        let work = '', up = '', idUp = '', qr = '';
        inputs.forEach(inp => {
            const field = inp.getAttribute('data-field');
            const val = inp.value;
            if (field === 'workFormation') work = val;
            else if (field === 'uploadedDocs') up = val;
            else if (field === 'createdIdAndUploaded') idUp = val;
            else if (field === 'qrScans') qr = val;
        });
        if (allData[currentBranch]) {
            allData[currentBranch].workFormation = work;
            allData[currentBranch].uploadedDocs = up;
            allData[currentBranch].createdIdAndUploaded = idUp;
            allData[currentBranch].qrScans = qr;
        }

        const selectedDate = dateInput.value;
        
        // Формируем читаемый текст для письма
        let emailText = `ОТЧЕТ ПО СТАТИСТИКЕ MAX\n`;
        emailText += `Дата: ${selectedDate}\n`;
        emailText += `========================\n\n`;
        
        let totalWork = 0, totalUploaded = 0, totalId = 0, totalQr = 0;
        
        branches.forEach(b => {
            const rec = allData[b];
            const w = parseInt(rec.workFormation) || 0;
            const u = parseInt(rec.uploadedDocs) || 0;
            const i = parseInt(rec.createdIdAndUploaded) || 0;
            const q = parseInt(rec.qrScans) || 0;
            
            totalWork += w;
            totalUploaded += u;
            totalId += i;
            totalQr += q;
            
            emailText += `${b}:\n`;
            emailText += `  • Работа по формированию: ${w}\n`;
            emailText += `  • Загрузили документы: ${u}\n`;
            emailText += `  • Создали ID и загрузили: ${i}\n`;
            emailText += `  • Считывания QR: ${q}\n\n`;
        });
        
        emailText += `========================\n`;
        emailText += `ИТОГО:\n`;
        emailText += `  • Работа по формированию: ${totalWork}\n`;
        emailText += `  • Загрузили документы: ${totalUploaded}\n`;
        emailText += `  • Создали ID и загрузили: ${totalId}\n`;
        emailText += `  • Считывания QR: ${totalQr}\n`;

        // Формируем данные для отправки через Formspree
        const formData = new FormData();
        formData.append('email', 'karetskyag@mprop.ru');
        formData.append('subject', `Статистика MAX за ${selectedDate}`);
        formData.append('message', emailText);
        
        // Добавляем копию отчета как файл
        const reportData = {
            date: selectedDate,
            branches: allData,
            totals: {
                workFormation: totalWork,
                uploadedDocs: totalUploaded,
                createdIdAndUploaded: totalId,
                qrScans: totalQr
            }
        };
        
        const jsonBlob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
        formData.append('attachment', jsonBlob, `statistics_max_${selectedDate}.json`);

        try {
            statusDiv.className = 'status-message status-sending';
            statusDiv.textContent = '⏳ Отправка данных...';
            
            const response = await fetch('https://formspree.io/f/mzzpgqjl', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            if (response.ok) {
                statusDiv.className = 'status-message status-success';
                statusDiv.textContent = '✅ Статистика успешно отправлена на karetskyag@mprop.ru!';
                
                // Также сохраняем файл локально как резервную копию
                const url = URL.createObjectURL(jsonBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `statistics_max_${selectedDate}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    statusDiv.className = 'status-message';
                }, 5000);
            } else {
                throw new Error('Ошибка отправки');
            }
        } catch (error) {
            statusDiv.className = 'status-message status-error';
            statusDiv.textContent = '❌ Ошибка отправки. Данные сохранены локально.';
            
            // Сохраняем локально в случае ошибки
            const url = URL.createObjectURL(jsonBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `statistics_max_${selectedDate}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
                statusDiv.className = 'status-message';
            }, 5000);
        }
    }

    saveBtn.addEventListener('click', sendToEmail);
    renderTable();
})();
</script>
</body>
</html>
